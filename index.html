<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google — Ember Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scene"></div>

<header class="topbar">
  <nav class="topbar__links">
    <a href="#">About</a>
    <a href="#">Store</a>
  </nav>
  <nav class="topbar__actions">
    <a href="#" class="icon-link" title="Apps" aria-label="Apps">
      <svg width="20" height="20" viewBox="0 0 24 24"><circle cx="5" cy="5" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="12" cy="19" r="2"/><circle cx="19" cy="19" r="2"/></svg>
    </a>
    <a href="#" class="signin-btn">Sign in</a>
  </nav>
</header>

<main class="hero">

  <h1 class="wordmark" aria-label="Google">
    <span style="--i:0">G</span><span style="--i:1">o</span><span style="--i:2">o</span><span style="--i:3">g</span><span style="--i:4">l</span><span style="--i:5">e</span>
  </h1>

  <form class="search" id="searchForm" role="search" autocomplete="off">
    <div class="search__bar" id="searchBar">
      <svg class="search__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="text"
        id="searchInput"
        class="search__input"
        placeholder="Search the ember web"
        aria-label="Search"
        aria-autocomplete="list"
        aria-controls="suggestions"
      >
      <button type="button" class="mic-btn" title="Search by voice" aria-label="Search by voice">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10v1a7 7 0 0 0 14 0v-1"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
        </svg>
      </button>
    </div>
    <ul class="suggestions" id="suggestions" role="listbox" hidden></ul>

    <div class="search__actions">
      <button type="submit" class="btn">Search</button>
      <button type="button" class="btn" id="luckyBtn">I'm Feeling Lucky</button>
    </div>
  </form>

  <p class="offer">Google offered in: <a href="#">Română</a> <a href="#">Français</a> <a href="#">Deutsch</a></p>
</main>

<footer class="footer">
  <div class="footer__region">Romania</div>
  <div class="footer__cols">
    <div class="footer__col">
      <a href="#">Advertising</a>
      <a href="#">Business</a>
      <a href="#">How Search works</a>
    </div>
    <div class="footer__col">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#" id="themeToggle">Settings</a>
    </div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
